<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<meta name="theme-color" content="#02050f">

<title>NovaStream Lite</title>

<style>

body{
margin:0;
background:#02050f;
color:white;
font-family:Arial, sans-serif;
overflow-x:hidden;
}

header{
padding:15px;
font-size:22px;
font-weight:bold;
}

#buscador{
width:90%;
margin:10px auto;
display:block;
padding:10px;
border-radius:8px;
border:none;
font-size:16px;
}

.section{
margin-top:20px;
padding-left:10px;
}

.section h2{
margin-left:10px;
}

.carrusel{
display:flex;
overflow-x:auto;
scroll-behavior:smooth;
padding:10px;
}

.card{
flex:0 0 auto;
width:150px;
margin-right:10px;
cursor:pointer;
}

.card img{
width:100%;
border-radius:8px;
}

.card:focus{
outline:3px solid #00e5ff;
transform:scale(1.08);
}

#banner{
width:100%;
height:220px;
background:#000;
display:flex;
align-items:center;
justify-content:center;
}

#banner img{
width:100%;
height:100%;
object-fit:cover;
}

</style>

</head>

<body>

<header>NovaStream Lite</header>

<input type="text" id="buscador" placeholder="Buscar película o canal...">

<div id="banner"></div>

<div id="contenido"></div>

<script>

const jsonURL = "https://raw.githubusercontent.com/crdzoalex-cyber/Lite.html/main/datos.json";

let datos = [];

async function cargarJSON(){

try{

const response = await fetch(jsonURL,{
cache:"no-store"
});

datos = await response.json();

crearSecciones();

crearBanner();

}catch(e){
console.log("Error cargando JSON",e);
}

}

function crearBanner(){

if(!datos.banner)return;

let banner = document.getElementById("banner");

banner.innerHTML = `<img src="${datos.banner}" loading="lazy">`;

}

function crearSecciones(){

let cont = document.getElementById("contenido");

cont.innerHTML="";

if(!datos.channels)return;

let seccion = document.createElement("div");
seccion.className="section";

seccion.innerHTML="<h2>Canales</h2>";

let carrusel = document.createElement("div");
carrusel.className="carrusel";

datos.channels.forEach(canal=>{

let card = document.createElement("div");
card.className="card";
card.tabIndex=0;

card.onclick=()=>{
playVideo(canal.url,canal.title);
};

card.innerHTML=`
<img src="${canal.poster}" alt="${canal.title}" loading="lazy">
`;

carrusel.appendChild(card);

});

seccion.appendChild(carrusel);

cont.appendChild(seccion);

}

function playVideo(urlVideo,titulo){

let esYouTube = (
urlVideo.length===11 ||
urlVideo.includes("youtube.com") ||
urlVideo.includes("youtu.be") ||
urlVideo.includes("/live/")
);

if(esYouTube){

let videoId = urlVideo;

if(urlVideo.includes("v=")){
videoId = urlVideo.split("v=")[1].split("&")[0];
}

if(urlVideo.includes("youtu.be/")){
videoId = urlVideo.split("youtu.be/")[1].split("?")[0];
}

if(urlVideo.includes("/live/")){
videoId = urlVideo.split("/live/")[1].split("?")[0];
}

if(window.AndroidInterface){

AndroidInterface.abrirYouTube(videoId,titulo,false);

}

}else{

if(window.AndroidInterface){

AndroidInterface.abrirReproductor(urlVideo,titulo,false);

}

}

}

document.getElementById("buscador").addEventListener("input",function(){

let texto=this.value.toLowerCase();

let cards=document.querySelectorAll(".card");

cards.forEach(card=>{

let alt=card.querySelector("img").alt.toLowerCase();

if(alt.includes(texto)){

card.style.display="block";

}else{

card.style.display="none";

}

});

});

cargarJSON();

</script>

</body>

</html>
