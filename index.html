<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Nova Stream Lite 📱</title>
    <style>
        /* === ESTILOS BASE (AZUL NOVA) === */
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { 
            margin: 0; padding: 0; background-color: #02050f; color: #ffffff; 
            font-family: 'Segoe UI', sans-serif; overflow-x: hidden; 
            padding-bottom: 70px; padding-top: calc(75px + env(safe-area-inset-top, 25px)); 
        }
        ::-webkit-scrollbar { display: none; }

        /* === INTRO SPLASH === */
        #splash-screen { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background-color: #02050f; z-index: 999999; display: flex; flex-direction: column; justify-content: center; align-items: center; transition: transform 0.4s cubic-bezier(0.77, 0, 0.175, 1), opacity 0.4s ease; }
        .splash-slide-up { transform: translateY(-100%); opacity: 0; }
        .splash-logo-nova { font-size: 50px; font-weight: 900; color: #2a60ff; text-shadow: 0 0 20px rgba(30, 80, 255, 0.8); letter-spacing: 4px; line-height: 1; }
        .splash-logo-lite { font-size: 16px; font-weight: 600; color: #888; letter-spacing: 10px; margin-top: 5px; }

        /* === CABECERA === */
        header { 
            position: fixed; top: 0; left: 0; width: 100%; display: flex; justify-content: space-between; align-items: center; 
            padding: calc(10px + env(safe-area-inset-top, 35px)) 20px 10px 20px; 
            background: #02050f; border-bottom: 1px solid #1e50ff; box-shadow: 0 5px 15px rgba(2, 5, 15, 1); z-index: 999; 
        }
        .logo-container { display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .logo-nova { font-size: 22px; font-weight: 900; color: #2a60ff; text-shadow: 0 0 10px rgba(30, 80, 255, 0.8); letter-spacing: 2px; line-height: 1; }
        .logo-lite { font-size: 9px; font-weight: 600; color: #888; letter-spacing: 4px; margin-top: 2px; }
        .search-container { display: flex; align-items: center; background: rgba(30, 80, 255, 0.1); border-radius: 20px; padding: 4px 12px; border: 1px solid rgba(30, 80, 255, 0.5); }
        .search-bar { background: transparent; border: none; color: white; outline: none; width: 130px; font-size: 14px; transition: 0.3s; }
        .search-bar::placeholder { color: #5577cc; }
        .search-btn { background: transparent; border: none; color: #2a60ff; font-size: 16px; margin-left: 5px; }

        /* === SECCIONES === */
        .content-section { display: none; animation: fadeIn 0.3s ease; }
        .content-section.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        /* === CABECERAS === */
        .section-header { display: flex; justify-content: space-between; align-items: center; padding-right: 15px; margin-top: 20px; margin-bottom: 10px; }
        .section-title { margin: 0 0 0 15px; font-size: 17px; font-weight: bold; border-left: 3px solid #1e50ff; padding-left: 10px; text-shadow: 0 0 8px rgba(30, 80, 255, 0.6); }
        .btn-more, .btn-back { background: rgba(30,80,255,0.2); border: 1px solid #2a60ff; color: white; padding: 6px 14px; border-radius: 20px; cursor: pointer; font-weight: bold; font-size: 12px; transition: 0.2s; display: flex; align-items: center; gap: 5px; }
        .btn-more:active, .btn-back:active { transform: scale(0.95); background: rgba(30,80,255,0.4); }
        .header-back { display: flex; align-items: center; padding: 15px; gap: 15px; margin-top: 5px; margin-bottom: 10px; }
        .btn-back { font-size: 14px; } 

        /* === NUEVO BANNER ÚNICO (DISEÑO ANTI-PIXELADO Y PLASMA PARA TV) === */
        .hero-carousel-wrapper { width: 100%; position: relative; margin-bottom: 10px; padding-top: 5px; }
        
        .hero-banner-single {
            width: 100%; height: 220px; position: relative; border-radius: 12px; overflow: hidden;
            border: 3px solid transparent; background: #02050f; cursor: pointer; padding: 0; margin: 0;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5); transition: transform 0.2s, border 0.2s;
            display: block; outline: none;
        }

        .hero-banner-single img { 
            width: 70%; height: 100%; object-fit: contain; object-position: right center;
            position: absolute; right: 0; top: 0; transition: opacity 0.5s ease-in-out; z-index: 1;
        }

        /* 🔥 EFECTO VIDRIO Y PLASMA ANIMADO 🔥 */
        @keyframes plasmaMove {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        .hero-glass-panel {
            position: absolute; top: 0; left: 0; width: 65%; height: 100%;
            background: linear-gradient(-45deg, rgba(2,5,15,0.95), rgba(30,80,255,0.4), rgba(255,0,51,0.2), rgba(2,5,15,0.95));
            background-size: 300% 300%; animation: plasmaMove 8s ease infinite;
            backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px); z-index: 2;
            display: flex; align-items: center; justify-content: center;
            padding: 10px 40px 60px 20px; /* Espacio abajo para no tapar el título de la peli */
            /* Difuminado hacia la derecha para mezclarse con el póster */
            -webkit-mask-image: linear-gradient(to right, black 65%, transparent 100%);
            mask-image: linear-gradient(to right, black 65%, transparent 100%);
        }

        /* Textos y Logo Animado dentro del Vidrio */
        .hero-promo-content { text-align: center; width: 100%; transition: opacity 0.5s ease; }
        .promo-text-anim {
            font-size: 13px; font-weight: 500; color: #e0e6ff; text-shadow: 0 2px 4px rgba(0,0,0,0.9);
            font-style: italic; line-height: 1.4; padding: 0 10px;
        }
        .promo-logo-anim {
            font-size: 26px; font-weight: 900; color: #ffffff; 
            text-shadow: 0 0 15px #2a60ff, 0 0 30px #1e50ff; letter-spacing: 3px;
        }

        /* 💥 El efecto de Quemado para el logo 💥 */
        .burn-effect { animation: burnAnim 1.5s forwards; }
        @keyframes burnAnim {
            0% { filter: brightness(1) blur(0px); opacity: 1; transform: scale(1); }
            40% { filter: brightness(1.5) blur(1px) sepia(0.8) hue-rotate(-30deg) saturate(3); opacity: 0.9; transform: scale(1.05); color: #ff8c00; text-shadow: 0 0 20px #ff0000; }
            100% { filter: brightness(0) blur(8px); opacity: 0; transform: scale(1.1) translateY(-10px); color: #000; }
        }

        .hero-gradient {
            position: absolute; bottom: 0; left: 0; width: 100%; height: 60%;
            background: linear-gradient(to top, rgba(10,10,10,1) 0%, rgba(10,10,10,0) 100%),
                        linear-gradient(to right, rgba(10,10,10,1) 0%, rgba(10,10,10,0) 50%);
            pointer-events: none; z-index: 3;
        }

        .hero-info { position: absolute; bottom: 15px; left: 15px; text-align: left; pointer-events: none; z-index: 10; width: 70%; }
        .hero-info h2 { margin: 0 0 8px 0; color: white; font-size: 20px; font-weight: bold; text-shadow: 0 2px 5px rgba(0,0,0,0.9); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

        .hero-play-btn { display: inline-block; background: white; color: black; padding: 4px 12px; border-radius: 4px; font-weight: bold; font-size: 12px; box-shadow: 0 2px 5px rgba(0,0,0,0.5); }
        .hero-badge { position: absolute; top: 10px; left: 10px; background: #ff0033; color: white; font-size: 10px; font-weight: bold; padding: 3px 8px; border-radius: 4px; box-shadow: 0 0 8px rgba(255,0,51,0.6); z-index: 10; }

        /* Flechas visuales */
        .hero-arrow {
            position: absolute; top: 50%; transform: translateY(-50%);
            background: rgba(0,0,0,0.4); color: white; border: none; font-size: 16px; padding: 8px 12px;
            cursor: pointer; z-index: 20; border-radius: 8px; transition: 0.3s; backdrop-filter: blur(4px);
        }
        .hero-arrow:hover { background: rgba(42, 96, 255, 0.8); }
        .hero-arrow:active { transform: translateY(-50%) scale(0.9); }
        .hero-arrow-left { left: 10px; }
        .hero-arrow-right { right: 10px; }

        /* === FILAS Y GRILLAS === */
        .movie-row { display: flex; overflow-x: auto; gap: 12px; padding: 0 15px 15px 15px; scroll-snap-type: x mandatory; }
        .movie-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 15px; padding: 0 15px 15px 15px; }
        @media (max-width: 400px) { .movie-grid { grid-template-columns: repeat(2, 1fr); } }
        
        .movie-card-container { flex: 0 0 115px; scroll-snap-align: start; cursor: pointer; display: flex; flex-direction: column; }
        .movie-grid .movie-card-container { flex: unset; width: 100%; }
        .movie-poster-box { border-radius: 8px; overflow: hidden; position: relative; background: #000; border: 1px solid rgba(30, 80, 255, 0.3); box-shadow: 0 2px 8px rgba(0,0,0,0.3); transition: 0.2s; }
        .movie-card-container:active .movie-poster-box { transform: scale(0.95); border-color: #2a60ff; box-shadow: 0 0 10px rgba(30, 80, 255, 0.5); }
        .movie-poster-box img { width: 100%; height: 170px; object-fit: cover; display: block; }
        .movie-title-text { font-size: 13px; color: #ddd; margin-top: 8px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; width: 100%; text-align: center; }

        /* === CANALES TV === */
        .canal-item { 
            border-radius: 8px; overflow: hidden; position: relative; border: 1px solid rgba(30, 80, 255, 0.3); background: #000; 
            cursor: pointer; transition: transform 0.2s, border-color 0.2s; z-index: 1; transform: translateZ(0); will-change: transform; 
        }
        .canal-item:active, .canal-item:focus { transform: scale(0.95) translateZ(0); border-color: #2a60ff; box-shadow: 0 0 10px rgba(30, 80, 255, 0.5); outline: none; z-index: 10; }
        .canal-item img { width: 100%; aspect-ratio: 16 / 9; height: auto; object-fit: contain; padding: 10px; background: white; display: block; }
        .canal-title { text-align: center; font-size: 12px; padding: 5px; color: white; background: #111; margin: 0;}
        .dot-live { position: absolute; top: 8px; left: 8px; width: 10px; height: 10px; background-color: #ff0033; border-radius: 50%; z-index: 10; box-shadow: 0 0 3px #000; }

        /* === CAJA INVISIBLE Y BANNER PROMO PRO === */
        .banner-wrapper { width: 100%; display: block; padding-top: 10px; padding-bottom: 15px; background: transparent; }
        .promo-banner {
            display: flex; justify-content: space-between; align-items: center; background: linear-gradient(135deg, #1e50ff 0%, #0a195c 100%);
            border: 2px solid transparent; border-radius: 12px; margin: 0 auto; width: calc(100% - 30px); max-width: 650px; 
            z-index: 10; flex-shrink: 0; height: 120px; position: relative; padding: 0; cursor: pointer; box-sizing: border-box;
            outline: none; transition: transform 0.3s, box-shadow 0.3s, border-color 0.3s; font-family: inherit; color: white; overflow: hidden;
        }
        .promo-banner:focus { transform: scale(0.98); border-color: #ffffff; box-shadow: 0 0 20px rgba(30, 80, 255, 0.9); }
        .promo-content { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: flex; justify-content: space-between; align-items: center; padding: 15px 20px; box-sizing: border-box; opacity: 0; visibility: hidden; transition: opacity 0.8s ease-in-out, visibility 0.8s; }
        .promo-content.active { opacity: 1; visibility: visible; }
        .promo-text-wrapper { flex: 1; padding-right: 15px; text-align: left; }
        .promo-content h3 { margin: 0 0 4px 0; font-size: 15px; font-weight: bold; text-shadow: 1px 1px 3px #000; }
        .promo-content p { margin: 0; font-size: 11px; color: #d0d8ff; line-height: 1.2; }
        .promo-badge { background: #ff0033; color: white; font-size: 9px; padding: 3px 6px; border-radius: 4px; font-weight: bold; position: absolute; top: 10px; right: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.5); z-index: 10; }
        .promo-btn { background: rgba(255, 255, 255, 0.2); padding: 7px 12px; border-radius: 20px; font-size: 11px; font-weight: bold; white-space: nowrap; border: 1px solid rgba(255,255,255,0.5); }
        .cartel-2-btn { background: #ff0033 !important; border-color: transparent; }
        .nova-slogan { font-weight: bold; font-style: italic; font-size: 10px !important; color: #fff !important; margin-top: 4px !important; text-shadow: none;}

        /* === PÍLDORAS / PAÍSES === */
        .category-pill-container { 
            display: flex; overflow-x: auto; gap: 10px; padding: 5px 15px 25px 15px; scroll-snap-type: x mandatory; 
            position: -webkit-sticky; position: sticky; top: calc(55px + env(safe-area-inset-top, 25px)); 
            z-index: 998; background: #02050f; box-shadow: 0 -40px 0px #02050f; border-bottom: 1px solid rgba(30, 80, 255, 0.2); 
            scrollbar-width: none; 
        }
        .category-pill-container::-webkit-scrollbar { display: none; }
        .category-pill { background: rgba(30, 80, 255, 0.1); border: 1px solid rgba(30, 80, 255, 0.4); color: #aaa; padding: 6px 16px; border-radius: 20px; font-size: 13px; white-space: nowrap; cursor: pointer; transition: 0.3s; outline: none; font-family: inherit; }
        .category-pill.active { background: rgba(30, 80, 255, 0.3); color: #fff; border-color: #2a60ff; box-shadow: 0 0 10px rgba(30, 80, 255, 0.4); font-weight: bold; }
        .category-pill:focus { background: rgba(30, 80, 255, 0.6); border-color: #fff; box-shadow: 0 0 10px #2a60ff; transform: scale(1.05); }
        
        /* === NAVEGACIÓN === */
        nav { 
            position: fixed; bottom: 0; left: 0; width: 100%; height: 60px; 
            background: #02050f; border-top: 1px solid #1e50ff; box-shadow: 0 -5px 15px rgba(2, 5, 15, 1); 
            display: flex; justify-content: space-around; align-items: center; z-index: 999; 
        }
        .nav-item { display: flex; flex-direction: column; align-items: center; color: #666; font-size: 10px; cursor: pointer; transition: 0.3s; outline: none; background: transparent; border: none; font-family: inherit; padding: 0; }
        .nav-item.active { color: #2a60ff; text-shadow: 0 0 10px rgba(30, 80, 255, 0.8); }
        .nav-item i { font-size: 22px; margin-bottom: 3px; font-style: normal; }
        .nav-item:focus { color: #2a60ff; text-shadow: 0 0 15px rgba(30, 80, 255, 1); transform: scale(1.1); }

        /* === MODO HORIZONTAL === */
        @media (orientation: landscape) {
            body { padding-top: 60px; padding-bottom: 55px; }
            header { padding: 5px 20px; }
            .category-pill-container { top: 45px; padding: 5px 15px 15px 15px; box-shadow: 0 -30px 0px #02050f; }
            .hero-banner-single { height: 200px; } 
            .section-header { margin-top: 10px; margin-bottom: 5px; }
            .section-title { font-size: 15px; }
            .movie-card-container { flex: 0 0 100px; }
            .movie-poster-box img { height: 140px; }
            .movie-grid { grid-template-columns: repeat(auto-fill, minmax(120px, 1fr)); gap: 10px; }
            .canal-item img { padding: 5px; }
            .canal-title { font-size: 10px; padding: 3px; }
            nav { height: 50px; }
            .nav-item i { font-size: 18px; margin-bottom: 2px; }
        }

        /* === MODO CONTROL REMOTO (TV FOCUS) === */
        *:focus { outline: none; } 
        .movie-card-container:focus .movie-poster-box, .canal-item:focus, .category-pill:focus, .nav-item:focus, .search-bar:focus, .btn-more:focus, .btn-back:focus {
            transform: scale(1.08) !important; border: 3px solid #ffffff !important; box-shadow: 0 0 25px rgba(42, 96, 255, 0.9) !important; z-index: 100; transition: 0.2s; border-radius: 8px;
        }
        .hero-banner-single:focus {
            transform: scale(0.98) !important; border: 3px solid #ffffff !important; box-shadow: 0 0 25px rgba(42, 96, 255, 0.9) !important; z-index: 100; transition: 0.2s; border-radius: 12px;
        }
        .category-pill:focus, .nav-item:focus, .btn-more:focus, .btn-back:focus { border-radius: 20px; }
    </style>
</head>
<body>

    <div id="splash-screen">
        <span class="splash-logo-nova">NOVA</span>
        <span class="splash-logo-lite">LITE</span>
    </div>

    <header>
        <div class="logo-container">
            <span class="logo-nova">NOVA</span>
            <span class="logo-lite">LITE</span>
        </div>
        <div class="search-container">
            <input type="text" id="searchInput" tabindex="0" class="search-bar" placeholder="Buscar peli..." oninput="buscarInteligente(this.value)">
            <span class="search-btn">🔍</span>
        </div>
    </header>

    <main>
        <div id="sec-busqueda" class="content-section">
            <div class="section-header"><h3 class="section-title">Resultados</h3></div>
            <div class="movie-grid" id="contenedor-resultados"></div>
        </div>

        <div id="sec-catalogo" class="content-section">
            <div class="header-back">
                <button class="btn-back" tabindex="0" onclick="volverDeCatalogo()">❮ Volver</button>
                <h3 class="section-title" id="titulo-catalogo" style="margin: 0; border: none; padding: 0;">Catálogo</h3>
            </div>
            <div class="movie-grid" id="grilla-catalogo"></div>
        </div>

        <div id="sec-cine" class="content-section active">
            
            <div class="hero-carousel-wrapper">
                <button id="hero-banner" class="hero-banner-single" tabindex="0" onclick="reproducirEstrenoActual()" onkeydown="if(event.key==='Enter' || event.keyCode===13) reproducirEstrenoActual()">
                    
                    <img id="hero-img" src="" alt="Estreno">
                    
                    <div class="hero-glass-panel">
                        <div id="promo-text-container" class="hero-promo-content"></div>
                    </div>

                    <div class="hero-gradient"></div>
                    
                    <div class="hero-arrow hero-arrow-left" onclick="event.stopPropagation(); carruselAnterior()">❮</div>
                    <div class="hero-arrow hero-arrow-right" onclick="event.stopPropagation(); carruselSiguiente()">❯</div>

                    <div class="hero-badge" id="hero-badge-text">NUEVO</div>
                    <div class="hero-info">
                        <h2 id="hero-title">Cargando estrenos... 🚀</h2>
                        <div class="hero-play-btn">▶ Reproducir</div>
                    </div>
                </button>
            </div>

            <div class="section-header" style="margin-top: 5px;">
                <h3 class="section-title">🚀 Últimos Estrenos</h3>
                <button class="btn-more" id="btn-ver-estrenos" tabindex="0" onclick="abrirCatalogoCompleto('Estrenos', window.miBaseDeDatos.peliculasEstrenos ? 'peliculasEstrenos' : 'estrenos')">Ver todos ❯</button>
            </div>

            <div class="section-header">
                <h3 class="section-title">🔥 Acción</h3>
                <button class="btn-more" tabindex="0" onclick="abrirCatalogoCompleto('Acción', 'peliculasAccion')">Ver más ❯</button>
            </div>
            <div class="movie-row" id="row-accion"></div>
            
            <div class="section-header">
                <h3 class="section-title">👻 Terror</h3>
                <button class="btn-more" tabindex="0" onclick="abrirCatalogoCompleto('Terror', 'peliculasTerror')">Ver más ❯</button>
            </div>
            <div class="movie-row" id="row-terror"></div>
            
            <div class="section-header">
                <h3 class="section-title">🧸 Infantiles</h3>
                <button class="btn-more" tabindex="0" onclick="abrirCatalogoCompleto('Infantiles', 'peliculasInfantiles')">Ver más ❯</button>
            </div>
            <div class="movie-row" id="row-infantiles"></div>
        </div> 

        <div id="sec-series" class="content-section">
            <div class="section-header">
                <h3 class="section-title">📺 Series Top</h3>
                <button class="btn-more" tabindex="0" onclick="abrirCatalogoCompleto('Series', 'seriesData')">Ver más ❯</button>
            </div>
            <div class="movie-row" id="row-series"></div>
        </div>

        <div id="sec-tv" class="content-section">
            <div class="banner-wrapper">
                <button class="promo-banner" id="promo-tv" tabindex="0" onclick="abrirPromoPro()" onkeydown="if(event.key==='Enter' || event.keyCode===13) abrirPromoPro()">
                    <div class="promo-content cartel-1 active">
                        <div class="promo-text-wrapper">
                            <h3>¡Pásate a Premium!</h3>
                            <p>Descubre Nova Pro, la experiencia completa.</p>
                        </div>
                        <div class="promo-btn">Ver Beneficios</div>
                    </div>
                    <div class="promo-content cartel-2">
                        <div class="promo-badge">SIN ANUNCIOS</div>
                        <div class="promo-text-wrapper">
                            <h3>Versión Mejorada</h3>
                            <p>Sin anuncios, versión mejorada y con beneficios Premium.</p>
                            <p class="nova-slogan">Nova, siempre lo mejor...</p>
                        </div>
                        <div class="promo-btn cartel-2-btn">Actualizar</div>
                    </div>
                </button>
            </div>

            <div class="category-pill-container">
                <button class="category-pill active" tabindex="0" onclick="filtrarCanales('todos', this)" onkeydown="if(event.key==='Enter' || event.keyCode===13) filtrarCanales('todos', this)">Todos</button>
                <button class="category-pill" tabindex="0" onclick="filtrarCanales('bolivia', this)" onkeydown="if(event.key==='Enter' || event.keyCode===13) filtrarCanales('bolivia', this)">Bolivia</button>
                <button class="category-pill" tabindex="0" onclick="filtrarCanales('argentina', this)" onkeydown="if(event.key==='Enter' || event.keyCode===13) filtrarCanales('argentina', this)">Argentina</button>
                <button class="category-pill" tabindex="0" onclick="filtrarCanales('mexico', this)" onkeydown="if(event.key==='Enter' || event.keyCode===13) filtrarCanales('mexico', this)">México</button>
                <button class="category-pill" tabindex="0" onclick="filtrarCanales('colombia', this)" onkeydown="if(event.key==='Enter' || event.keyCode===13) filtrarCanales('colombia', this)">Colombia</button>
                <button class="category-pill" tabindex="0" onclick="filtrarCanales('chile', this)" onkeydown="if(event.key==='Enter' || event.keyCode===13) filtrarCanales('chile', this)">Chile</button>
                <button class="category-pill" tabindex="0" onclick="filtrarCanales('peru', this)" onkeydown="if(event.key==='Enter' || event.keyCode===13) filtrarCanales('peru', this)">Perú</button>
                <button class="category-pill" tabindex="0" onclick="filtrarCanales('ecuador', this)" onkeydown="if(event.key==='Enter' || event.keyCode===13) filtrarCanales('ecuador', this)">Ecuador</button>
                <button class="category-pill" tabindex="0" onclick="filtrarCanales('venezuela', this)" onkeydown="if(event.key==='Enter' || event.keyCode===13) filtrarCanales('venezuela', this)">Venezuela</button>
                <button class="category-pill" tabindex="0" onclick="filtrarCanales('internacional', this)" onkeydown="if(event.key==='Enter' || event.keyCode===13) filtrarCanales('internacional', this)">Internacional</button>
                <button class="category-pill" tabindex="0" onclick="filtrarCanales('infantiles', this)" onkeydown="if(event.key==='Enter' || event.keyCode===13) filtrarCanales('infantiles', this)">Infantiles</button>
                <button class="category-pill" tabindex="0" onclick="filtrarCanales('deportes', this)" onkeydown="if(event.key==='Enter' || event.keyCode===13) filtrarCanales('deportes', this)">Deportes</button>
                <button class="category-pill" tabindex="0" onclick="filtrarCanales('noticias', this)" onkeydown="if(event.key==='Enter' || event.keyCode===13) filtrarCanales('noticias', this)">Noticias</button>
                <button class="category-pill" tabindex="0" onclick="filtrarCanales('cine', this)" onkeydown="if(event.key==='Enter' || event.keyCode===13) filtrarCanales('cine', this)">Cine</button>
                <button class="category-pill" tabindex="0" onclick="filtrarCanales('musica', this)" onkeydown="if(event.key==='Enter' || event.keyCode===13) filtrarCanales('musica', this)">Música</button>
                <button class="category-pill" tabindex="0" onclick="filtrarCanales('cam', this)" onkeydown="if(event.key==='Enter' || event.keyCode===13) filtrarCanales('Cam', this)">Cam</button>
                <button class="category-pill" tabindex="0" onclick="filtrarCanales('religiosos', this)" onkeydown="if(event.key==='Enter' || event.keyCode===13) filtrarCanales('religiosos', this)">Religiosos</button>
            </div>

            <div class="movie-grid" id="grilla-tv"></div>
        </div>
        
        <div id="sec-perfil" class="content-section">
            <div style="text-align: center; padding: 40px; color: #aaa;">
                <div style="width: 80px; height: 80px; background: rgba(30,80,255,0.2); border-radius: 50%; margin: 0 auto 15px; border: 2px solid #2a60ff; display: flex; justify-content: center; align-items: center; font-size: 30px; color: white;">👤</div>
                <h3 style="color: white; margin-bottom: 5px;">Usuario VIP</h3>
            </div>
        </div>
    </main>

    <nav>
        <button class="nav-item active" tabindex="0" onclick="cambiarSeccion('sec-cine', this)" onkeydown="if(event.key==='Enter' || event.keyCode===13) cambiarSeccion('sec-cine', this)"><i>🎬</i><span>Cine</span></button>
        <button class="nav-item" tabindex="0" onclick="cambiarSeccion('sec-series', this)" onkeydown="if(event.key==='Enter' || event.keyCode===13) cambiarSeccion('sec-series', this)"><i>📺</i><span>Series</span></button>
        <button class="nav-item" tabindex="0" onclick="cambiarSeccion('sec-tv', this)" onkeydown="if(event.key==='Enter' || event.keyCode===13) cambiarSeccion('sec-tv', this)"><i>📡</i><span>TV</span></button>
        <button class="nav-item" tabindex="0" onclick="cambiarSeccion('sec-perfil', this)" onkeydown="if(event.key==='Enter' || event.keyCode===13) cambiarSeccion('sec-perfil', this)"><i>👤</i><span>Perfil</span></button>
    </nav>

    <script>
        window.miBaseDeDatos = {};
        window.todosLosCanales = []; 
        window.loteTimeout = null; 
        window.canalIndex = 0;
        window.canalesMostrados = [];

        // === ARRANQUE INICIAL ===
        document.addEventListener('DOMContentLoaded', () => {
            setTimeout(() => {
                const splash = document.getElementById('splash-screen');
                if (splash && splash.style.display !== 'none') {
                    splash.classList.add('splash-slide-up');
                    setTimeout(() => { splash.style.display = 'none'; }, 400);
                }
            }, 5000);
            cargarBaseDeDatos();
            rotarTextosPlasma(); // Arranca el motor de textos del plasma
        });

        // === DESCARGA DEL JSON ===
        async function cargarBaseDeDatos() {
            try {
                const linkSeguro = 'https://raw.githubusercontent.com/crdzoalex-cyber/Lite.html/main/datos.json?nocache=' + new Date().getTime();
                const response = await fetch(linkSeguro);
                const db = await response.json();
                window.miBaseDeDatos = db;

                if(db.peliculasEstrenos && db.peliculasEstrenos.length > 0) {
                    iniciarCarruselUnico(db.peliculasEstrenos);
                } else if(db.estrenos && db.estrenos.length > 0) {
                    iniciarCarruselUnico(db.estrenos);
                } else {
                    document.getElementById('hero-title').textContent = "No hay estrenos hoy.";
                }

                const splash = document.getElementById('splash-screen');
                if(splash) {
                    splash.classList.add('splash-slide-up');
                    setTimeout(() => { splash.style.display = 'none'; }, 400);
                }
                
                armarFila('row-accion', db.peliculasAccion);
                armarFila('row-terror', db.peliculasTerror);
                armarFila('row-infantiles', db.peliculasInfantiles);
                armarFila('row-series', db.seriesData);

                window.todosLosCanales = db.channels || [];
                renderizarCanalesPorLotes(window.todosLosCanales);

            } catch (error) {
                console.log("Error descargando el JSON:", error);
                document.getElementById('hero-title').textContent = 'Error de conexión ❌';
            }
        }

        // === NUEVO MOTOR: TEXTOS DEL PLASMA Y LOGO QUEMADO ===
        let textoPlasmaIndex = 0;
        const textosPlasma = [
            '<div class="promo-text-anim">"Con Nova siempre lo mejor"</div>',
            '<div class="promo-text-anim">Pasate a la versión premium, sin anuncios molestos y la mejor experiencia visual</div>',
            '<div class="promo-logo-anim">NOVA LITE</div>'
        ];

        function rotarTextosPlasma() {
            const container = document.getElementById('promo-text-container');
            if(!container) return;

            if (textoPlasmaIndex === 2) { 
                // Es el turno del logo NOVA LITE
                container.style.opacity = 0;
                setTimeout(() => {
                    container.innerHTML = textosPlasma[textoPlasmaIndex];
                    container.style.opacity = 1;
                    
                    // Esperamos 3 segundos brillando, y luego lo quemamos
                    setTimeout(() => {
                        const logo = container.querySelector('.promo-logo-anim');
                        if(logo) logo.classList.add('burn-effect');
                        
                        // Esperamos a que se haga cenizas (1.5s) y reiniciamos
                        setTimeout(() => {
                            textoPlasmaIndex = 0;
                            rotarTextosPlasma();
                        }, 1600); 
                    }, 3500); 
                }, 500);
            } else { 
                // Textos normales
                container.style.opacity = 0;
                setTimeout(() => {
                    container.innerHTML = textosPlasma[textoPlasmaIndex];
                    container.style.opacity = 1;
                    textoPlasmaIndex++;
                    setTimeout(rotarTextosPlasma, 4000); // Cada frase dura 4 segundos
                }, 500);
            }
        }

        // === NUEVO MOTOR: CARRUSEL ÚNICO ===
        let listaEstrenos = []; 
        let indiceCarrusel = 0;
        let temporizadorCarrusel;

        function iniciarCarruselUnico(arrayPelis) {
            if (!arrayPelis || arrayPelis.length === 0) return;
            listaEstrenos = arrayPelis;
            
            actualizarBanner();
            resetTemporizador();
            configurarGestosTouch(); 
        }

        function resetTemporizador() {
            clearInterval(temporizadorCarrusel); 
            temporizadorCarrusel = setInterval(() => {
                carruselSiguiente();
            }, 6000); // 6 segundos por póster
        }

        function carruselSiguiente() {
            if(listaEstrenos.length === 0) return;
            indiceCarrusel++;
            if(indiceCarrusel >= listaEstrenos.length) indiceCarrusel = 0; 
            actualizarBanner();
            resetTemporizador(); 
        }

        function carruselAnterior() {
            if(listaEstrenos.length === 0) return;
            indiceCarrusel--;
            if(indiceCarrusel < 0) indiceCarrusel = listaEstrenos.length - 1; 
            actualizarBanner();
            resetTemporizador();
        }

        function actualizarBanner() {
            const img = document.getElementById("hero-img");
            const titulo = document.getElementById("hero-title");
            const peli = listaEstrenos[indiceCarrusel];

            img.style.opacity = 0;
            
            setTimeout(() => {
                img.src = peli.poster || peli.imagen; 
                titulo.textContent = peli.title || peli.titulo;
                img.style.opacity = 1;
            }, 300);
        }

        function reproducirEstrenoActual() {
            if(listaEstrenos.length === 0) return;
            const peli = listaEstrenos[indiceCarrusel];
            const tituloFinal = peli.title || peli.titulo;
            const tituloLimpio = tituloFinal.replace(/'/g, "\\'");
            
            playCinematic(peli.url, peli.isYT || false, tituloLimpio);
        }

        function configurarGestosTouch() {
            let touchStartX = 0;
            let touchEndX = 0;
            const banner = document.getElementById('hero-banner');
            banner.addEventListener('touchstart', e => {
                touchStartX = e.changedTouches[0].screenX;
            }, {passive: true});
            banner.addEventListener('touchend', e => {
                touchEndX = e.changedTouches[0].screenX;
                if (touchEndX < touchStartX - 50) carruselSiguiente(); 
                if (touchEndX > touchStartX + 50) carruselAnterior();  
            }, {passive: true});
        }

        // === MOTOR DE SCROLL INFINITO PARA TV ===
        function renderizarCanalesPorLotes(listaCanales) {
            const grillaTV = document.getElementById('grilla-tv');
            grillaTV.innerHTML = ''; 
            window.canalesMostrados = listaCanales;
            window.canalIndex = 0;
            cargarMasCanales();
        }

        function cargarMasCanales() {
            if (window.canalIndex >= window.canalesMostrados.length) return; 
            const grillaTV = document.getElementById('grilla-tv');
            let htmlLote = '';
            const lote = window.canalesMostrados.slice(window.canalIndex, window.canalIndex + 28);
            
            lote.forEach(canal => {
                const tituloLimpio = (canal.name || '').replace(/'/g, "\\'");
                htmlLote += `
                    <div class="canal-item" tabindex="0" data-category="${canal.cat}" onclick="playCinematic('${canal.url}', ${canal.isYT || false}, '${tituloLimpio}')" onkeydown="if(event.key==='Enter' || event.keyCode===13) playCinematic('${canal.url}', ${canal.isYT || false}, '${tituloLimpio}')">
                        <div class="dot-live"></div>
                        <img src="${canal.logo}" alt="${canal.name}" loading="lazy">
                        <p class="canal-title">${canal.name}</p>
                    </div>`;
            });
            
            grillaTV.insertAdjacentHTML('beforeend', htmlLote);
            window.canalIndex += 28; 
        }

        window.addEventListener('scroll', () => {
            if ((window.innerHeight + window.scrollY) >= document.body.offsetHeight - 500) {
                clearTimeout(window.loteTimeout);
                window.loteTimeout = setTimeout(cargarMasCanales, 150);
            }
        });

        // === FUNCIONES AUXILIARES ===
        const armarFila = (idContenedor, arrayPelis) => {
            const cont = document.getElementById(idContenedor);
            cont.innerHTML = '';
            if (!arrayPelis || arrayPelis.length === 0) {
                cont.innerHTML = '<span style="color:#5577cc; padding-left:15px; font-size:12px;">Próximamente...</span>';
                return;
            }
            arrayPelis.slice(0, 5).forEach(peli => {
                const tituloLimpio = (peli.title || '').replace(/'/g, "\\'");
                let cartelDuracion = peli.dur ? `<span style="position:absolute; top:8px; right:8px; background:rgba(2, 5, 15, 0.85); color:#fff; font-size:10px; font-weight:bold; padding:4px 7px; border-radius:4px; z-index:10;">⏱ ${peli.dur}</span>` : '';

                cont.innerHTML += `
                    <div class="movie-card-container" tabindex="0" onclick="playCinematic('${peli.url}', ${peli.isYT || false}, '${tituloLimpio}')" onkeydown="if(event.key==='Enter' || event.keyCode===13) playCinematic('${peli.url}', ${peli.isYT || false}, '${tituloLimpio}')">
                        <div class="movie-poster-box" style="position:relative;">
                            ${cartelDuracion}
                            <img src="${peli.poster}" alt="${peli.title}">
                        </div>
                        <div class="movie-title-text">${peli.title}</div>
                    </div>
                `;
            });
        };

        let seccionAntesDelCatalogo = 'sec-cine';
        function abrirCatalogoCompleto(nombreCategoria, claveJson) {
            const activaActual = document.querySelector('.content-section.active');
            if(activaActual) seccionAntesDelCatalogo = activaActual.id;
            document.querySelectorAll('.content-section').forEach(sec => sec.classList.remove('active'));
            document.getElementById('sec-catalogo').classList.add('active');
            document.getElementById('titulo-catalogo').innerText = "Todo en " + nombreCategoria;

            const contenedor = document.getElementById('grilla-catalogo');
            contenedor.innerHTML = '';
            const arrayPelis = window.miBaseDeDatos[claveJson];

            if(arrayPelis && arrayPelis.length > 0) {
                arrayPelis.forEach(peli => {
                    const tituloLimpio = peli.title.replace(/'/g, "\\'");
                    let cartelDuracion = peli.dur ? `<span style="position:absolute; top:8px; right:8px; background:rgba(2, 5, 15, 0.85); color:#fff; font-size:10px; font-weight:bold; padding:4px 7px; border-radius:4px; z-index:10;">⏱ ${peli.dur}</span>` : '';

                    contenedor.innerHTML += `
                        <div class="movie-card-container" tabindex="0" onclick="playCinematic('${peli.url}', ${peli.isYT || false}, '${tituloLimpio}')" onkeydown="if(event.key==='Enter' || event.keyCode===13) playCinematic('${peli.url}', ${peli.isYT || false}, '${tituloLimpio}')">
                            <div class="movie-poster-box" style="position:relative;">
                                ${cartelDuracion}
                                <img src="${peli.poster}" alt="${peli.title}">
                            </div>
                            <div class="movie-title-text">${peli.title}</div>
                        </div>
                    `;
                });
            } else {
                contenedor.innerHTML = '<span style="color:#555; padding: 20px; grid-column: 1/-1; text-align: center;">No hay contenido aquí todavía.</span>';
            }
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function volverDeCatalogo() {
            document.querySelectorAll('.content-section').forEach(sec => sec.classList.remove('active'));
            document.getElementById(seccionAntesDelCatalogo).classList.add('active');
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        let seccionAnterior = 'sec-cine';
        function cambiarSeccion(idSeccion, elementoBoton) {
            const buscador = document.getElementById('searchInput');
            buscador.value = ''; 
            buscador.placeholder = idSeccion === 'sec-cine' ? 'Buscar peli...' : idSeccion === 'sec-series' ? 'Buscar serie...' : idSeccion === 'sec-tv' ? 'Buscar canal...' : 'Buscar...';

            document.querySelectorAll('.content-section').forEach(sec => sec.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(btn => btn.classList.remove('active'));

            document.getElementById(idSeccion).classList.add('active');
            if(elementoBoton) elementoBoton.classList.add('active');
            window.scrollTo({ top: 0, behavior: 'smooth' });

            if (idSeccion === 'sec-tv') {
                setTimeout(() => {
                    const primerCanal = document.querySelector('#grilla-tv .canal-item');
                    if (primerCanal) primerCanal.focus();
                }, 150);
            } else if (idSeccion === 'sec-cine') {
                setTimeout(() => {
                    const hero = document.getElementById('hero-banner');
                    if(hero) hero.focus();
                }, 150);
            }
        }

        let temporizadorBusqueda;
        function buscarInteligente(texto) {
            clearTimeout(temporizadorBusqueda);
            temporizadorBusqueda = setTimeout(() => { realizarBusqueda(texto); }, 400); 
        }

        function realizarBusqueda(textoIngresado) {
            const texto = textoIngresado.toLowerCase().trim();
            const secBusqueda = document.getElementById('sec-busqueda');
            const contenedorResultados = document.getElementById('contenedor-resultados');

            if (texto === '') {
                document.querySelectorAll('.content-section').forEach(sec => sec.classList.remove('active'));
                document.getElementById(seccionAnterior).classList.add('active');
                return;
            }

            const activaActual = document.querySelector('.content-section.active');
            if(activaActual.id !== 'sec-busqueda') seccionAnterior = activaActual.id;

            document.querySelectorAll('.content-section').forEach(sec => sec.classList.remove('active'));
            secBusqueda.classList.add('active');
            
            let htmlResultados = '';
            let encontradas = 0;

            if (seccionAnterior === 'sec-tv') {
                window.todosLosCanales.forEach(canal => {
                    if (canal.name.toLowerCase().includes(texto)) {
                        const tituloLimpio = canal.name.replace(/'/g, "\\'");
                        htmlResultados += `
                            <div class="canal-item" tabindex="0" onclick="playCinematic('${canal.url}', ${canal.isYT || false}, '${tituloLimpio}')" onkeydown="if(event.key==='Enter' || event.keyCode===13) playCinematic('${canal.url}', ${canal.isYT || false}, '${tituloLimpio}')">
                                <div class="dot-live"></div>
                                <img src="${canal.logo}" alt="${canal.name}">
                                <p class="canal-title">${canal.name}</p>
                            </div>`;
                        encontradas++;
                    }
                });
            } else {
                const seccionDondeBuscar = document.getElementById(seccionAnterior);
                seccionDondeBuscar.querySelectorAll('.movie-card-container').forEach(tarjeta => {
                    let titulo = "";
                    const img = tarjeta.querySelector('img');
                    if(img && img.alt) titulo += img.alt.toLowerCase();
                    const textoInterior = tarjeta.innerText;
                    if(textoInterior) titulo += " " + textoInterior.toLowerCase();

                    if (titulo.includes(texto)) {
                        htmlResultados += tarjeta.outerHTML; 
                        encontradas++;
                    }
                });
            }

            if(encontradas === 0) {
                contenedorResultados.innerHTML = '<div style="grid-column: 1/-1; text-align:center; padding:20px; color:#aaa;">No se encontró nada 🛸</div>';
            } else {
                contenedorResultados.innerHTML = htmlResultados;
            }
        }

        function filtrarCanales(categoria, botonApretado) {
            document.querySelectorAll('.category-pill').forEach(btn => btn.classList.remove('active'));
            botonApretado.classList.add('active');

            if (categoria === 'todos') {
                renderizarCanalesPorLotes(window.todosLosCanales);
            } else {
                const filtrados = window.todosLosCanales.filter(c => c.cat === categoria);
                renderizarCanalesPorLotes(filtrados);
            }
        }

        function playCinematic(arg1, arg2, arg3) {
            if (!arg1) return; 
            let urlVideo = String(arg1);
            let tituloVideo = (arg2 === true || arg2 === false || arg2 === "true" || arg2 === "false") ? arg3 : arg2;
            if (!tituloVideo) tituloVideo = "Canal en Vivo";

            let esYouTube = (arg2 === true || arg2 === "true" || urlVideo.includes("youtube.com") || urlVideo.includes("youtu.be"));

            if (esYouTube) {
                let videoId = urlVideo; 
                if (urlVideo.includes("http")) {
                    if (urlVideo.includes("v=")) videoId = urlVideo.split('v=')[1];
                    else if (urlVideo.includes("youtu.be/")) videoId = urlVideo.split('youtu.be/')[1];
                    else if (urlVideo.includes("/live/")) videoId = urlVideo.split('/live/')[1];
                    else videoId = urlVideo.split('/').pop();
                    if (videoId.includes('?')) videoId = videoId.split('?')[0];
                    if (videoId.includes('&')) videoId = videoId.split('&')[0];
                }
                if (typeof AndroidInterface !== "undefined") {
                    AndroidInterface.abrirYouTube(videoId, String(tituloVideo));
                } else {
                    console.log("Modo Web: YouTube -> " + videoId);
                }
            } else {
                if (typeof AndroidInterface !== "undefined") {
                    AndroidInterface.abrirReproductor(urlVideo, String(tituloVideo));
                } else {
                    console.log("Modo Web: VLC -> " + urlVideo);
                }
            }
        }

        // === GUARDIA DE TRÁFICO (CONTROL REMOTO TV) ===
        document.addEventListener('keydown', function(event) {
            const focoActual = document.activeElement;
            
            if (event.key === 'ArrowRight' || event.keyCode === 39) {
                if (focoActual.id === 'hero-banner') {
                    event.preventDefault(); 
                    carruselSiguiente();
                }
            }
            if (event.key === 'ArrowLeft' || event.keyCode === 37) {
                if (focoActual.id === 'hero-banner') {
                    event.preventDefault();
                    carruselAnterior();
                }
            }

            if (event.key === 'ArrowDown' || event.keyCode === 40) {
                if (focoActual.tagName === 'INPUT' || focoActual.id === 'searchInput') {
                    event.preventDefault(); 
                    if (document.getElementById('sec-cine').classList.contains('active')) {
                        const primerEstreno = document.querySelector('.hero-banner-single');
                        if (primerEstreno) primerEstreno.focus();
                    } else if (document.getElementById('sec-tv').classList.contains('active')) {
                        const promoTv = document.getElementById('promo-tv');
                        if (promoTv) promoTv.focus();
                    }
                }
                else if (focoActual.id === 'hero-banner') {
                    event.preventDefault();
                    const btnVerTodos = document.getElementById('btn-ver-estrenos');
                    if (btnVerTodos) btnVerTodos.focus();
                }
                else if (focoActual.id === 'promo-tv') {
                    event.preventDefault();
                    const pildoraActiva = document.querySelector('.category-pill.active') || document.querySelector('.category-pill');
                    if (pildoraActiva) pildoraActiva.focus();
                }
                else if (focoActual.classList.contains('category-pill')) {
                    event.preventDefault();
                    const primerCanal = document.querySelector('#grilla-tv .canal-item');
                    if (primerCanal) primerCanal.focus();
                }
            }

            if (event.key === 'ArrowUp' || event.keyCode === 38) {
                if (focoActual.classList.contains('canal-item')) {
                    const posicionEnPantalla = focoActual.getBoundingClientRect();
                    if (posicionEnPantalla.top < 280) { 
                        event.preventDefault(); 
                        const pildoraActiva = document.querySelector('.category-pill.active') || document.querySelector('.category-pill');
                        if (pildoraActiva) pildoraActiva.focus();
                    }
                } 
                else if (focoActual.classList.contains('category-pill')) {
                    event.preventDefault();
                    const promoTv = document.getElementById('promo-tv');
                    if (promoTv) promoTv.focus();
                }
                else if (focoActual.id === 'promo-tv') {
                    event.preventDefault();
                    document.getElementById('searchInput').focus();
                }
                else if (focoActual.id === 'btn-ver-estrenos') {
                    event.preventDefault();
                    document.getElementById('hero-banner').focus();
                }
                else if (focoActual.id === 'hero-banner' || focoActual.classList.contains('movie-card-container')) {
                    const posicionEnPantalla = focoActual.getBoundingClientRect();
                    if (posicionEnPantalla.top < 250) { 
                        event.preventDefault();
                        document.getElementById('searchInput').focus();
                    }
                }
            }
        });

        // === MOTOR DE TRANSICIÓN DE BANNERS (SECCIÓN TV) ===
        document.addEventListener('DOMContentLoaded', () => {
            const cartel1 = document.querySelector('.cartel-1');
            const cartel2 = document.querySelector('.cartel-2');
            if (!cartel1 || !cartel2) return;

            let intervalId;
            const startPromoTransition = () => {
                clearInterval(intervalId);
                intervalId = setInterval(() => {
                    cartel1.classList.toggle('active');
                    cartel2.classList.toggle('active');
                }, 6000); 
            };
            startPromoTransition(); 
            
            const promoBanner = document.querySelector('.promo-banner');
            if (promoBanner) {
                promoBanner.addEventListener('focus', () => clearInterval(intervalId));
                promoBanner.addEventListener('blur', () => startPromoTransition());
                promoBanner.addEventListener('mouseenter', () => clearInterval(intervalId));
                promoBanner.addEventListener('mouseleave', () => startPromoTransition());
            }
        });

        function abrirPromoPro() {
            alert("¡Próximamente! Descarga la versión PRO para eliminar todos los anuncios.");
        }
    </script>                                        
</body>
</html>
